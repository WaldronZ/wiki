name: Wiki

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Python syntax
        run: python -m py_compile scripts/build_wiki.py scripts/render_report_html.py scripts/validate_wiki.py scripts/apply_review_plan.py scripts/apply_library_metadata.py scripts/export_library_csv.py

      - name: Check generated wiki is current
        run: python scripts/build_wiki.py docs --check

      - name: Validate wiki artifacts
        run: python scripts/validate_wiki.py docs --strict-taxonomy

      - name: Validate inline wiki scripts
        run: node scripts/check_wiki_js.js docs

      - name: Run workflow tests
        run: python -m unittest discover -s tests
