name: Wiki

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m py_compile scripts/build_wiki.py scripts/render_report_html.py scripts/validate_wiki.py

      - name: Rebuild wiki
        run: python scripts/build_wiki.py docs

      - name: Validate wiki artifacts
        run: python scripts/validate_wiki.py docs
